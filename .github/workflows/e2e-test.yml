name: End-to-End Integration Tests

on:
  workflow_call:



jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        profile_group:
          - "metadata airflow"
          - "kafka-lite kafka-full"
          - "flink1-lite flink1-full"
          - "spark-lite spark-full"
          - "ch-lite ch-full"
          - "trino metabase"
          - "mlflow ray-serve"
          - "lineage telemetry"
          - "fluss valkey"
          - "postgres storage catalog"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.10

      - name: Install odctl
        run: uv tool install .

      - name: Initialize odctl workspace
        run: yes | odctl init --force

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test Profile Group
        run: |
          # Split the space-separated group into an array
          for profile in ${{ matrix.profile_group }}; do
            echo "::group::Testing Profile: $profile"
            echo "🚀 Launching $profile..."
            odctl up $profile

            echo "⏳ Validating containers..."
            SUCCESS=0
            for i in {1..15}; do
              RUNNING=$(docker ps -q | wc -l)
              if [ "$RUNNING" -ge 1 ]; then
                echo "✅ Containers are running!"
                docker ps
                odctl ps --all
                SUCCESS=1
                break
              fi
              echo "Waiting... ($i/15)"
              sleep 2
            done

            if [ "$SUCCESS" -eq 0 ]; then
              echo "❌ Timeout reached: No containers are running for $profile!"
              docker ps -a
              odctl ps --all
              exit 1
            fi

            echo "🧹 Tearing down $profile..."
            yes | odctl down --all --volumes
            echo "::endgroup::"
          done
