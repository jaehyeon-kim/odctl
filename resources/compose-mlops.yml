name: dml-mlops

# ==========================================
# Shared Volumes for Stateless Airflow
# ==========================================
volumes:
  airflow-dags:
    name: airflow-dags
  airflow-plugins:
    name: airflow-plugins

x-airflow-common: &airflow-common
  image: ghcr.io/jaehyeon-kim/open-dataml-stack/airflow:${TAG:-local}
  networks:
    - dml
  profiles:
    - airflow
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY:-46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    # AWS Credentials for Iceberg/Boto3 tasks and Sidecar Sync
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-user}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-password}
    AWS_DEFAULT_REGION: us-east-1
  volumes:
    - airflow-dags:/opt/airflow/dags
    - airflow-plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"

services:
  # ==========================================
  # [PROFILE: airflow] Orchestration
  # ==========================================
  airflow-sync:
    image: amazon/aws-cli:2.34.45
    container_name: airflow-sync
    profiles:
      - airflow
    networks:
      - dml
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-user}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-password}
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - airflow-dags:/opt/airflow/dags
      - airflow-plugins:/opt/airflow/plugins
    command: >
      bash -c "
      echo 'Starting DAG sync from dedicated SeaweedFS Airflow bucket...'
      while true; do
        aws --endpoint-url http://seaweed:8333 s3 sync s3://airflow/dags /opt/airflow/dags --exact-timestamps
        aws --endpoint-url http://seaweed:8333 s3 sync s3://airflow/plugins /opt/airflow/plugins --exact-timestamps
        sleep 30
      done
      "

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "Initializing Airflow Database Schema..."
        airflow db migrate
        airflow users create \
          --username user \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email user@example.com \
          --password password
        echo "Airflow initialization complete."

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    container_name: airflow-triggerer
    command: triggerer
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ==========================================
  # [PROFILE: mlflow] Experiment Tracking
  # ==========================================
  mlflow:
    image: ghcr.io/jaehyeon-kim/open-dataml-stack/mlflow:${TAG:-local}
    container_name: mlflow
    profiles:
      - mlflow
    networks:
      - dml
    ports:
      - "5000:5000"
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-user}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-password}
      AWS_DEFAULT_REGION: us-east-1
      MLFLOW_S3_ENDPOINT_URL: http://seaweed:8333
    command: >
      mlflow server
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres/mlflow
      --artifacts-destination s3://warehouse/mlflow
      --serve-artifacts
      --host 0.0.0.0
      --port 5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # [PROFILE: feast] Feature Store
  # ==========================================
  feast:
    image: ghcr.io/jaehyeon-kim/open-dataml-stack/feast:${TAG:-local}
    container_name: feast
    profiles:
      - feast
    networks:
      - dml
    ports:
      - "6566:6566"
    volumes:
      - ./feast:/opt/feast/feature_repo
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-user}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-password}
      AWS_DEFAULT_REGION: us-east-1
      FEAST_S3_ENDPOINT_URL: http://seaweed:8333
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      VALKEY_USER: ${VALKEY_USER:-user}
      VALKEY_PASSWORD: ${VALKEY_PASSWORD:-password}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-user}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-password}
    command: >
      bash -c "
      echo 'Waiting for infrastructure (Postgres, Valkey, ClickHouse) to be available...'
      while ! timeout 1 bash -c '</dev/tcp/postgres/5432'; do sleep 2; done
      while ! timeout 1 bash -c '</dev/tcp/valkey/6379'; do sleep 2; done
      while ! timeout 1 bash -c '</dev/tcp/clickhouse/8123'; do sleep 2; done

      echo 'Infrastructure is up! Applying Feast metadata...'
      cd /opt/feast/feature_repo
      feast apply 

      echo 'Starting Feast Server...'
      feast serve -h 0.0.0.0 -p 6566
      "

networks:
  dml:
    name: dml
    external: true
