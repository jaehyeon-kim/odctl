name: dml-kafka

x-common-environment: &kafka_broker_common_env_vars # KRaft settings
  KAFKA_PROCESS_ROLES: "broker,controller"
  KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
  KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:19091,2@kafka-2:19091,3@kafka-3:19091"
  CLUSTER_ID: ${KAFKA_CLUSTER_ID:-42RglGpZQwy9D5VzTVpCWA}
  # Common Kafka settings
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,LISTENER_DOCKER_INTERNAL:PLAINTEXT,LISTENER_DOCKER_EXTERNAL:PLAINTEXT,LISTENER_MINIKUBE:PLAINTEXT
  KAFKA_INTER_BROKER_LISTENER_NAME: LISTENER_DOCKER_INTERNAL
  KAFKA_LOG4J_ROOT_LOGLEVEL: INFO
  KAFKA_NUM_PARTITIONS: "3"
  KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
  KAFKA_LOG_CLEANUP_POLICY: "delete"
  KAFKA_LOG_RETENTION_BYTES: "524288000" # 500 MB
  KAFKA_LOG_SEGMENT_BYTES: "67108864" # 64 MB segments
  KAFKA_LOG_RETENTION_MS: "86400000" # 1 day
  # Modern Consumer & Share Group Protocols (KIP-848 & KIP-932 GA)
  KAFKA_GROUP_COORDINATOR_REBALANCE_PROTOCOLS: "classic,consumer,share"
  # Application Limit: Restrict JVM so OS has RAM left for Page Cache
  KAFKA_HEAP_OPTS: "-Xmx750m -Xms750m"

services:
  # ==========================================
  # Apache Kafka Brokers
  # ==========================================
  kafka-1:
    image: apache/kafka:4.2.0
    container_name: kafka-1
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - dml
    profiles:
      - kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: CONTROLLER://kafka-1:19091,LISTENER_DOCKER_INTERNAL://kafka-1:19092,LISTENER_DOCKER_EXTERNAL://0.0.0.0:9092,LISTENER_MINIKUBE://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: LISTENER_DOCKER_INTERNAL://kafka-1:19092,LISTENER_DOCKER_EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9092,LISTENER_MINIKUBE://host.minikube.internal:29092
      <<: *kafka_broker_common_env_vars
    mem_limit: 1500m

  kafka-2:
    image: apache/kafka:4.2.0
    container_name: kafka-2
    ports:
      - "9093:9093"
      - "29093:29093"
    networks:
      - dml
    profiles:
      - kafka
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_LISTENERS: CONTROLLER://kafka-2:19091,LISTENER_DOCKER_INTERNAL://kafka-2:19093,LISTENER_DOCKER_EXTERNAL://0.0.0.0:9093,LISTENER_MINIKUBE://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: LISTENER_DOCKER_INTERNAL://kafka-2:19093,LISTENER_DOCKER_EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9093,LISTENER_MINIKUBE://host.minikube.internal:29093
      <<: *kafka_broker_common_env_vars
    mem_limit: 1500m

  kafka-3:
    image: apache/kafka:4.2.0
    container_name: kafka-3
    ports:
      - "9094:9094"
      - "29094:29094"
    networks:
      - dml
    profiles:
      - kafka
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_LISTENERS: CONTROLLER://kafka-3:19091,LISTENER_DOCKER_INTERNAL://kafka-3:19094,LISTENER_DOCKER_EXTERNAL://0.0.0.0:9094,LISTENER_MINIKUBE://0.0.0.0:29094
      KAFKA_ADVERTISED_LISTENERS: LISTENER_DOCKER_INTERNAL://kafka-3:19094,LISTENER_DOCKER_EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9094,LISTENER_MINIKUBE://host.minikube.internal:29094
      <<: *kafka_broker_common_env_vars
    mem_limit: 1500m

  # ==========================================
  # Open Source Kafka Connect (Apache Native)
  # ==========================================
  connect:
    image: apache/kafka:4.2.0
    container_name: connect
    restart: unless-stopped
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    ports:
      - "8083:8083"
    networks:
      - dml
    profiles:
      - kafka
    volumes:
      # Mount the optimized JARs from the init-deps container
      - dml-shared-deps:/mnt/shared-deps
    command: |
      bash -c '
      cat <<EOF > /tmp/connect.properties
      bootstrap.servers=kafka-1:19092,kafka-2:19093,kafka-3:19094
      group.id=dml-connect-cluster
      key.converter=org.apache.kafka.connect.json.JsonConverter
      value.converter=org.apache.kafka.connect.json.JsonConverter
      key.converter.schemas.enable=true
      value.converter.schemas.enable=true
      internal.key.converter=org.apache.kafka.connect.json.JsonConverter
      internal.value.converter=org.apache.kafka.connect.json.JsonConverter
      offset.storage.topic=dml-connect-offsets
      config.storage.topic=dml-connect-configs
      status.storage.topic=dml-connect-status
      rest.advertised.host.name=connect
      rest.port=8083
      plugin.path=/mnt/shared-deps/connect
      EOF
      /opt/kafka/bin/connect-distributed.sh /tmp/connect.properties
      '
    mem_limit: 2g
    environment:
      KAFKA_HEAP_OPTS: "-Xmx1500m -Xms1500m"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8083' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ==========================================
  # Open Source Schema Registry (Aiven Karapace)
  # ==========================================
  karapace:
    image: ghcr.io/aiven-open/karapace:6.1.3
    container_name: karapace
    entrypoint:
      - python3
      - -m
      - karapace
    ports:
      - "8081:8081"
    networks:
      - dml
    profiles:
      - kafka
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    mem_limit: 512m
    environment:
      KARAPACE_KARAPACE_REGISTRY: true
      KARAPACE_ADVERTISED_HOSTNAME: karapace
      KARAPACE_ADVERTISED_PROTOCOL: http
      KARAPACE_BOOTSTRAP_URI: kafka-1:19092,kafka-2:19093,kafka-3:19094
      KARAPACE_PORT: 8081
      KARAPACE_HOST: 0.0.0.0
      KARAPACE_CLIENT_ID: karapace-0
      KARAPACE_GROUP_ID: karapace
      KARAPACE_MASTER_ELECTION_STRATEGY: highest
      KARAPACE_MASTER_ELIGIBILITY: true
      KARAPACE_TOPIC_NAME: _schema
      KARAPACE_COMPATIBILITY: "BACKWARD"

  # ==========================================
  # Open Source Kafka UI (Kafbat)
  # ==========================================
  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafka-ui
    pull_policy: always
    restart: always
    ports:
      - "8086:8080"
    networks:
      - dml
    profiles:
      - kafka
    depends_on:
      connect:
        condition: service_healthy
    mem_limit: 512m
    environment:
      KAFKA_CLUSTERS_0_NAME: dml-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka-1:19092,kafka-2:19093,kafka-3:19094"
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_TYPE: "kafka-connect"
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_HEADERS: "Accept: application/json"
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: "http://connect:8083"
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: "http://karapace:8081"
      KAFKA_CLUSTERS_0_READONLY: "false"
      DYNAMIC_CONFIG_ENABLED: "true"

networks:
  dml:
    name: dml
    external: true

volumes:
  dml-shared-deps:
    name: dml-shared-deps
    external: true
