name: dml-store

x-clickhouse-base: &clickhouse-base
  image: clickhouse/clickhouse-server:24.3-alpine
  networks:
    - dml
  mem_limit: 4g
  environment:
    CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
  depends_on:
    - clickhouse-keeper
  healthcheck:
    test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 30s

services:
  # ==========================================
  # [SHARED] Consensus Node (Replaces Zookeeper)
  # ==========================================
  clickhouse-keeper:
    image: clickhouse/clickhouse-keeper:24.3-alpine
    container_name: clickhouse-keeper
    profiles:
      - clickhouse1
      - clickhouse2
      - fluss
    networks:
      - dml
    ports:
      - "9181:9181"
    volumes:
      - ./clickhouse/keeper_config.xml:/etc/clickhouse-keeper/keeper_config.xml
    mem_limit: 512m
    restart: always

  # ==========================================
  # [PROFILE: clickhouse1] Shard 1 (Replicas 1 & 2)
  # ==========================================
  clickhouse-1:
    <<: *clickhouse-base
    container_name: clickhouse-1
    profiles: ["clickhouse1"]
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.xml
      - ./clickhouse/macros-1.xml:/etc/clickhouse-server/config.d/macros.xml
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql

  clickhouse-2:
    <<: *clickhouse-base
    container_name: clickhouse-2
    profiles: ["clickhouse1"]
    ports:
      - "8124:8123"
      - "9001:9000"
    volumes:
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.xml
      - ./clickhouse/macros-2.xml:/etc/clickhouse-server/config.d/macros.xml
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql

  # ==========================================
  # [PROFILE: clickhouse2] Shard 2 (Replicas 1 & 2)
  # ==========================================
  clickhouse-3:
    <<: *clickhouse-base
    container_name: clickhouse-3
    profiles: ["clickhouse2"]
    ports:
      - "8125:8123"
      - "9002:9000"
    volumes:
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.xml
      - ./clickhouse/macros-3.xml:/etc/clickhouse-server/config.d/macros.xml
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql

  clickhouse-4:
    <<: *clickhouse-base
    container_name: clickhouse-4
    profiles: ["clickhouse2"]
    ports:
      - "8126:8123"
      - "9003:9000"
    volumes:
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.xml
      - ./clickhouse/macros-4.xml:/etc/clickhouse-server/config.d/macros.xml
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql

  # ==========================================
  # [PROFILE: fluss] Streaming Storage Engine
  # ==========================================
  fluss-coordinator:
    image: apache/fluss:0.9.0-incubating
    container_name: fluss-coordinator
    command: coordinatorServer
    profiles: ["fluss"]
    ports:
      - "9123:9123"
    networks:
      - dml
    depends_on:
      - clickhouse-keeper
    mem_limit: 1g
    environment:
      - JVM_ARGS=-Xmx512m
      - |
        FLUSS_PROPERTIES=
        zookeeper.address: clickhouse-keeper:9181
        bind.listeners: INTERNAL://fluss-coordinator:0, CLIENT://fluss-coordinator:9123
        advertised.listeners: CLIENT://fluss-coordinator:9123
        internal.listener.name: INTERNAL
        remote.data.dir: /tmp/fluss/remote-data

  fluss-tablet-1:
    image: apache/fluss:0.9.0-incubating
    container_name: fluss-tablet-1
    command: tabletServer
    profiles: ["fluss"]
    ports:
      - "9124:9123"
    networks:
      - dml
    depends_on:
      - fluss-coordinator
    mem_limit: 2g
    environment:
      - JVM_ARGS=-Xmx1500m
      - |
        FLUSS_PROPERTIES=
        zookeeper.address: clickhouse-keeper:9181
        bind.listeners: INTERNAL://fluss-tablet-1:0, CLIENT://fluss-tablet-1:9123
        advertised.listeners: CLIENT://fluss-tablet-1:9123
        internal.listener.name: INTERNAL
        tablet-server.id: 0
        kv.snapshot.interval: 0s
        data.dir: /tmp/fluss/data
        remote.data.dir: /tmp/fluss/remote-data

  # ==========================================
  # Valkey (Redis Alternative)
  # ==========================================
  valkey:
    image: valkey/valkey:9.1-alpine
    container_name: valkey
    ports:
      - "6379:6379"
    networks:
      - dml
    profiles:
      - valkey
    command:
      - valkey-server
      - --user
      - default
      - off
      - --user
      - user
      - "on"
      - ">password"
      - "~*"
      - "+@all"
      - --save
      - "60"
      - "1"
      - --loglevel
      - warning
    mem_limit: 512m

networks:
  dml:
    name: dml
    external: true
