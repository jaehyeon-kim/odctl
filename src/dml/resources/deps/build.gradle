plugins {
    id 'java'
}

repositories {
    mavenCentral()
    maven {
        url "https://packages.confluent.io/maven/"
    }
}

ext {
    confluentVersion = '8.2.0'
    flinkVersion = '1.20.4'
    hadoopVersion = '3.3.6'
}

configurations {
    confluentJars
    flinkJars
}

dependencies {
    // Schema Converters & Connect Logging
    confluentJars "io.confluent:kafka-connect-avro-converter:${confluentVersion}"
    confluentJars "io.confluent:kafka-connect-protobuf-converter:${confluentVersion}"
    confluentJars "io.confluent:kafka-connect-json-schema-converter:${confluentVersion}"
    confluentJars "org.apache.logging.log4j:log4j-slf4j2-impl:2.23.1"

    // Flink Parquet & Hadoop Client
    flinkJars "org.apache.flink:flink-parquet:${flinkVersion}"
    flinkJars "org.apache.hadoop:hadoop-client-api:${hadoopVersion}"
    flinkJars "org.apache.hadoop:hadoop-client-runtime:${hadoopVersion}"
}

// Extract Confluent JARs
task copyConfluentDependencies(type: Copy) {
    from configurations.confluentJars
    into "${buildDir}/confluent-converters"
}

// Extract Flink/Hadoop JARs
task copyFlinkDependencies(type: Copy) {
    from configurations.flinkJars
    into "${buildDir}/flink-jars"
}

// Run both tasks
task copyAllDependencies {
    dependsOn copyConfluentDependencies, copyFlinkDependencies
}