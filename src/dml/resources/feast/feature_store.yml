project: open_dataml

# Registry (Postgres)
registry:
  registry_type: sql
  path: postgresql+psycopg2://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/feast

# Provider
provider: local

# Online Store (Valkey with Auth)
online_store:
  type: redis
  # Standard Redis connection string: redis://[username]:[password]@host:port/db_index
  connection_string: redis://${VALKEY_USER:-user}:${VALKEY_PASSWORD:-password}@valkey:6379/0

# Offline Store (ClickHouse Dedicated DB)
offline_store:
  type: clickhouse
  host: clickhouse
  port: 8123
  user: ${CLICKHOUSE_USER:-user}
  password: ${CLICKHOUSE_PASSWORD:-password}
  database: feature_store
