server:
  applicationConnectors:
    - type: http
      port: 5000
  adminConnectors:
    - type: http
      port: 5001

db:
  driverClass: org.postgresql.Driver
  url: jdbc:postgresql://${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-marquez}
  user: ${POSTGRES_USER:-user}
  password: ${POSTGRES_PASSWORD:-password}

migrateOnStartup: true

logging:
  level: INFO
  appenders:
    - type: console
