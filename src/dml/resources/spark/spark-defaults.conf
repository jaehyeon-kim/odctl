# ========================================
# Dependencies / Classpath
# ========================================
# Automatically load all JARs downloaded by the init-deps container
spark.driver.extraClassPath   /mnt/shared-deps/shared/*:/mnt/shared-deps/spark/*
spark.executor.extraClassPath /mnt/shared-deps/shared/*:/mnt/shared-deps/spark/*

# ========================================
# Iceberg REST Catalog Integration
# ========================================
spark.sql.extensions                   org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.iceberg              org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.iceberg.type         rest
spark.sql.catalog.iceberg.uri          http://catalog:8181
spark.sql.catalog.iceberg.io-impl      org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.iceberg.s3.endpoint  http://seaweed:8333
spark.sql.catalog.iceberg.s3.path-style-access true
spark.sql.defaultCatalog               iceberg

# ========================================
# History Server & Event Logging (Local Volume)
# ========================================
spark.eventLog.enabled           true
spark.eventLog.dir               file:///tmp/spark-events
spark.history.fs.logDirectory    file:///tmp/spark-events
