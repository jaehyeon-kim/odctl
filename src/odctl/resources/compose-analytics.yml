name: odctl-analytics

x-clickhouse-base: &clickhouse-base
  image: clickhouse/clickhouse-server:24.3-alpine
  networks:
    - odctl
  mem_limit: 4g
  environment:
    CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    CLICKHOUSE_DO_NOT_CHOWN: 1
    CLICKHOUSE_PASSWORD: "password"
  depends_on:
    clickhouse-keeper:
      condition: service_healthy
  healthcheck:
    test:
      [
        "CMD",
        "clickhouse-client",
        "--password",
        "password",
        "--query",
        "SELECT 1",
      ]
    interval: 2s
    timeout: 2s
    retries: 30
    start_period: 5s

services:
  # ==========================================
  # [SHARED] Consensus Node
  # ==========================================
  clickhouse-keeper:
    image: clickhouse/clickhouse-keeper:24.3-alpine
    container_name: clickhouse-keeper
    # Keeper must run in BOTH profiles
    profiles:
      - ch-lite
      - ch-full
      - fluss
    networks:
      - odctl
    ports:
      - "9181:9181"
    volumes:
      - ./clickhouse/keeper_config.xml:/etc/clickhouse-keeper/keeper_config.xml
    mem_limit: 512m
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc 127.0.0.1 9181 || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 10

  # ==========================================
  # [PROFILE: ckh-single] DNS Blackhole
  # ==========================================
  # This container ONLY boots in the single profile to instantly
  # resolve DNS for the missing Shard 2, preventing the 22s timeout.
  clickhouse-shard2-stub:
    image: alpine:latest
    container_name: clickhouse-shard2-stub
    command: sleep infinity
    profiles: ["ch-lite"]
    networks:
      odctl:
        aliases:
          - clickhouse-21
          - clickhouse-22

  # ==========================================
  # Shard 1 (Active in BOTH profiles)
  # ==========================================
  clickhouse-11:
    <<: *clickhouse-base
    container_name: clickhouse-11
    profiles: ["ch-lite", "ch-full"]
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/cluster-config.xml
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/custom-users.xml
      - ./clickhouse/macros-11.xml:/etc/clickhouse-server/config.d/macros.xml

  clickhouse-12:
    <<: *clickhouse-base
    container_name: clickhouse-12
    profiles: ["ch-lite", "ch-full"]
    ports:
      - "8124:8123"
      - "9001:9000"
    volumes:
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/cluster-config.xml
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/custom-users.xml
      - ./clickhouse/macros-12.xml:/etc/clickhouse-server/config.d/macros.xml

  # ==========================================
  # Shard 2 (Active ONLY in multi profile)
  # ==========================================
  clickhouse-21:
    <<: *clickhouse-base
    container_name: clickhouse-21
    profiles: ["ch-full"]
    ports:
      - "8125:8123"
      - "9002:9000"
    volumes:
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/cluster-config.xml
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/custom-users.xml
      - ./clickhouse/macros-21.xml:/etc/clickhouse-server/config.d/macros.xml

  clickhouse-22:
    <<: *clickhouse-base
    container_name: clickhouse-22
    profiles: ["ch-full"]
    ports:
      - "8126:8123"
      - "9003:9000"
    volumes:
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/cluster-config.xml
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/custom-users.xml
      - ./clickhouse/macros-22.xml:/etc/clickhouse-server/config.d/macros.xml

  # ==========================================
  # [INIT: ch-lite] Database Initialization
  # ==========================================
  clickhouse-init-lite:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: clickhouse-init-lite
    profiles: ["ch-lite"]
    networks:
      - odctl
    depends_on:
      clickhouse-11:
        condition: service_healthy
      clickhouse-12:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      echo '[ch-lite] Creating databases on Shard 1...' &&
      clickhouse-client --host clickhouse-11 --user default --password password --query 'CREATE DATABASE IF NOT EXISTS feature_store;' &&
      clickhouse-client --host clickhouse-11 --user default --password password --query 'CREATE DATABASE IF NOT EXISTS odctl;' &&
      clickhouse-client --host clickhouse-12 --user default --password password --query 'CREATE DATABASE IF NOT EXISTS feature_store;' &&
      clickhouse-client --host clickhouse-12 --user default --password password --query 'CREATE DATABASE IF NOT EXISTS odctl;' &&
      echo '✅ [ch-lite] Databases created successfully!' &&
      sleep infinity
      "

  # ==========================================
  # [INIT: ch-full] Database Initialization
  # ==========================================
  clickhouse-init-full:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: clickhouse-init-full
    profiles: ["ch-full"]
    networks:
      - odctl
    depends_on:
      clickhouse-11:
        condition: service_healthy
      clickhouse-12:
        condition: service_healthy
      clickhouse-21:
        condition: service_healthy
      clickhouse-22:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      echo '[ch-full] Creating databases on Shard 1...' &&
      clickhouse-client --host clickhouse-11 --user default --password password --query 'CREATE DATABASE IF NOT EXISTS feature_store;' &&
      clickhouse-client --host clickhouse-11 --user default --password password --query 'CREATE DATABASE IF NOT EXISTS odctl;' &&
      clickhouse-client --host clickhouse-12 --user default --password password --query 'CREATE DATABASE IF NOT EXISTS feature_store;' &&
      clickhouse-client --host clickhouse-12 --user default --password password --query 'CREATE DATABASE IF NOT EXISTS odctl;' &&

      echo '[ch-full] Creating databases on Shard 2...' &&
      clickhouse-client --host clickhouse-21 --user default --password password --query 'CREATE DATABASE IF NOT EXISTS feature_store;' &&
      clickhouse-client --host clickhouse-21 --user default --password password --query 'CREATE DATABASE IF NOT EXISTS odctl;' &&
      clickhouse-client --host clickhouse-22 --user default --password password --query 'CREATE DATABASE IF NOT EXISTS feature_store;' &&
      clickhouse-client --host clickhouse-22 --user default --password password --query 'CREATE DATABASE IF NOT EXISTS odctl;' &&

      echo '✅ [ch-full] All databases created across the cluster!' &&
      sleep infinity
      "


  # ==========================================
  # [PROFILE: trino] Federated SQL Engine
  # ==========================================
  trino:
    image: trinodb/trino:480
    container_name: trino
    profiles:
      - trino
    networks:
      - odctl
    ports:
      - "8080:8080" # Trino UI & JDBC connection port
    mem_limit: 4g
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx3G"
    volumes:
      # Mount the static catalogs
      - ./trino/catalog:/etc/trino/catalog:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # [PROFILE: metabase] BI & Dashboarding
  # ==========================================
  metabase:
    image: metabase/metabase:v0.61.x
    container_name: metabase
    profiles:
      - metabase
    networks:
      - odctl
    ports:
      - "3000:3000"
    mem_limit: 1500m
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx1G"
      # Map Metabase's internal state to our unified Postgres instance
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-user}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-password}
      MB_DB_HOST: postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  odctl:
    name: odctl
    external: true
