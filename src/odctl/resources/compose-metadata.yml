name: odctl-metadata

services:
  # ==========================================
  # [PROFILE: metadata] Elasticsearch (OM Backend)
  # ==========================================
  openmetadata-es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.4
    container_name: openmetadata-es
    profiles:
      - metadata
    networks:
      - odctl
    ports:
      - "9200:9200"
      - "9300:9300"
    mem_limit: 2g
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1024m -Xmx1024m
      - xpack.security.enabled=false
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:9200/_cluster/health?pretty | grep status | grep -qE 'green|yellow' || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10

  # ==========================================
  # [PROFILE: metadata] OpenMetadata DB Migration
  # ==========================================
  openmetadata-migrate:
    image: docker.getcollate.io/openmetadata/server:1.12.6
    container_name: openmetadata-migrate
    command: "./bootstrap/openmetadata-ops.sh migrate"
    profiles:
      - metadata
    networks:
      - odctl
    mem_limit: 1g
    environment:
      # Leveraging the Unified Postgres container
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-user}
      DB_USER_PASSWORD: ${POSTGRES_PASSWORD:-password}
      OM_DATABASE: omt
      DB_DRIVER_CLASS: org.postgresql.Driver
      DB_SCHEME: postgresql
      DB_PARAMS: "allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
      # Elasticsearch
      ELASTICSEARCH_HOST: openmetadata-es
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_SCHEME: http
    depends_on:
      openmetadata-es:
        condition: service_healthy

  # ==========================================
  # [PROFILE: metadata] OpenMetadata Server
  # ==========================================
  openmetadata-server:
    image: docker.getcollate.io/openmetadata/server:1.12.6
    container_name: openmetadata-server
    restart: always
    profiles:
      - metadata
    networks:
      - odctl
    ports:
      - "8585:8585"
      - "8586:8586"
    mem_limit: 2g
    environment:
      JAVA_OPTS: "-Xms1G -Xmx1500m"
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-user}
      DB_USER_PASSWORD: ${POSTGRES_PASSWORD:-password}
      OM_DATABASE: omt
      DB_DRIVER_CLASS: org.postgresql.Driver
      DB_SCHEME: postgresql
      DB_PARAMS: "allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
      # Elasticsearch
      ELASTICSEARCH_HOST: openmetadata-es
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_SCHEME: http
      # OpenMetadata Core Config
      OPENMETADATA_CLUSTER_NAME: ${OPENMETADATA_CLUSTER_NAME:-openmetadata}
      SERVER_PORT: 8585
      SERVER_ADMIN_PORT: 8586
      LOG_LEVEL: INFO
      # Security & Auth
      AUTHORIZER_CLASS_NAME: org.openmetadata.service.security.DefaultAuthorizer
      AUTHORIZER_REQUEST_FILTER: org.openmetadata.service.security.JwtFilter
      AUTHORIZER_ADMIN_PRINCIPALS: "[admin,user]"
      AUTHORIZER_PRINCIPAL_DOMAIN: "open-data.local"
      AUTHORIZER_INGESTION_PRINCIPALS: "[ingestion-bot]"
      AUTHENTICATION_ENABLE_SELF_SIGNUP: "true"
      AUTHORIZER_ALLOWED_REGISTRATION_DOMAIN: '["all"]'
      AUTHENTICATION_PROVIDER: basic
      RSA_PUBLIC_KEY_FILE_PATH: "./conf/public_key.der"
      RSA_PRIVATE_KEY_FILE_PATH: "./conf/private_key.der"
      JWT_ISSUER: "open-data.local"
      JWT_KEY_ID: "Gb389a-9f76-gdjs-a92j-0242bk94356"
      # Ingestion & Lineage Connectivity
      PIPELINE_SERVICE_CLIENT_ENDPOINT: http://openmetadata-ingestion:8080
      SERVER_HOST_API_URL: http://openmetadata-server:8585/api
    depends_on:
      openmetadata-es:
        condition: service_healthy
      openmetadata-migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        ["CMD", "wget", "-q", "--spider", "http://localhost:8586/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # [PROFILE: metadata] OpenMetadata Ingestion (Standard Image)
  # ==========================================
  openmetadata-ingestion:
    image: docker.getcollate.io/openmetadata/ingestion:1.12.6
    container_name: openmetadata-ingestion
    profiles:
      - metadata
    networks:
      - odctl
    ports:
      - "8087:8080"
    environment:
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      # Unified Postgres config
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-password}
      AIRFLOW_DB: omt
      DB_SCHEME: postgresql+psycopg2
      # Lineage Configuration
      AIRFLOW__LINEAGE__BACKEND: airflow_provider_openmetadata.lineage.backend.OpenMetadataLineageBackend
      AIRFLOW__LINEAGE__AIRFLOW_SERVICE_NAME: local_airflow
      AIRFLOW__LINEAGE__OPENMETADATA_API_ENDPOINT: http://openmetadata-server:8585/api
      # Application Limit
      mem_limit: 1500m
    depends_on:
      openmetadata-server:
        condition: service_healthy

networks:
  odctl:
    name: odctl
    external: true
