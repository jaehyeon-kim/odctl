name: odctl-mlops

# Shared environment variables for SeaweedFS (S3) authentication
x-mlops-env: &mlops-env
  TZ: ${TZ:-UTC}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-user}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-password}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
  # Internal Docker routing to your SeaweedFS API
  AWS_ENDPOINT_URL: http://seaweed:8333
  # Allows on-the-fly pip installations without needing a requirements.txt file
  _PIP_ADDITIONAL_REQUIREMENTS: ${_MLOPS_PIP_DEPS:-}

services:
  # ==========================================
  # MLflow: Experiment Tracking & Model Registry
  # ==========================================
  mlflow:
    image: ghcr.io/jaehyeon-kim/odctl/ray-mlops:${TAG:-latest}
    container_name: mlflow
    profiles: ["mlflow", "ray-serve"]
    networks:
      - odctl
    ports:
      - "5000:5000"
    environment:
      <<: *mlops-env
    command: >
      mlflow server
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres/mlflow
      --default-artifact-root s3://mlflow
      --host 0.0.0.0
      --port 5000

  # ==========================================
  # Ray Serve: Real-time ML Inference Engine
  # ==========================================
  ray-serve:
    image: ghcr.io/jaehyeon-kim/odctl/ray-mlops:${TAG:-latest}
    container_name: ray-serve
    profiles: ["ray-serve"]
    networks:
      - odctl
    ports:
      - "8000:8000"
      - "8265:8265"
    environment:
      <<: *mlops-env
      MLFLOW_TRACKING_URI: http://mlflow:5000
      ICEBERG_CATALOG_URI: http://catalog:8181
      KAFKA_BOOTSTRAP_SERVERS: broker-1:19092,broker-2:19093,broker-3:19094
      # Database/Cache Authentication
      CLICKHOUSE_HOST: clickhouse-11
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-user}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-password}
      VALKEY_HOST: valkey
      VALKEY_USER: ${VALKEY_USER:-user}
      VALKEY_PASSWORD: ${VALKEY_PASSWORD:-password}
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-vector} # DB where vector extension is installed

    volumes:
      - ./mlops/serving:/home/ray/app
    working_dir: /home/ray/app
    command: ray start --head --port=6379 --dashboard-host=0.0.0.0 --block
    depends_on:
      - mlflow

networks:
  odctl:
    name: odctl
    external: true
