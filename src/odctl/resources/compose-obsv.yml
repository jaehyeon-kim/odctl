name: odctl-obsv

services:
  # ==========================================
  # [PROFILE: lineage] Marquez API
  # ==========================================
  marquez-api:
    image: marquezproject/marquez:0.51.1
    container_name: marquez-api
    profiles:
      - lineage
    networks:
      - odctl
    ports:
      - "5002:5000" # API
      - "5001:5001" # Admin
    mem_limit: 1g
    environment:
      # Leverage the unified Postgres instance from compose-infra.yml
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: marquez
    volumes:
      - ./marquez/marquez.yml:/usr/src/app/marquez.yml
    command: ["server", "/usr/src/app/marquez.yml"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # [PROFILE: lineage] Marquez Web UI
  # ==========================================
  marquez-web:
    image: marquezproject/marquez-web:0.51.1
    container_name: marquez-web
    profiles:
      - lineage
    networks:
      - odctl
    ports:
      - "3003:3000"
    mem_limit: 512m
    environment:
      MARQUEZ_HOST: marquez-api
      MARQUEZ_PORT: 5000
    depends_on:
      marquez-api:
        condition: service_healthy

  # ==========================================
  # [PROFILE: telemetry] Prometheus
  # ==========================================
  prometheus:
    image: prom/prometheus:v3
    container_name: prometheus
    profiles:
      - telemetry
    networks:
      - odctl
    ports:
      - "19090:9090"
    mem_limit: 1g
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"

  # ==========================================
  # [PROFILE: telemetry] Alertmanager
  # ==========================================
  alertmanager:
    image: prom/alertmanager:v0
    container_name: alertmanager
    profiles:
      - telemetry
    networks:
      - odctl
    ports:
      - "19093:9093"
    mem_limit: 256m
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"

  # ==========================================
  # [PROFILE: telemetry] Grafana
  # ==========================================
  grafana:
    image: grafana/grafana:12.4
    container_name: grafana
    profiles:
      - telemetry
    networks:
      - odctl
    ports:
      - "3004:3000"
    mem_limit: 1g
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-user}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-password}
    volumes:
      - ./grafana:/etc/grafana/provisioning
    depends_on:
      - prometheus

networks:
  odctl:
    name: odctl
    external: true
