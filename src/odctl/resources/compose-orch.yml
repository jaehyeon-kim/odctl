name: odctl-orch

# ==========================================
# Shared Volumes for Stateless Airflow
# ==========================================
volumes:
  airflow-dags:
    name: airflow-dags
  airflow-plugins:
    name: airflow-plugins

x-airflow-common: &airflow-common
  image: ghcr.io/jaehyeon-kim/odctl/airflow:${TAG:-latest}
  networks:
    - odctl
  profiles:
    - airflow
  mem_limit: 1500m
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres/airflow
    AIRFLOW__CORE__AUTH_MANAGER: "airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager"
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY:-46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    # AWS Credentials for Iceberg/Boto3 tasks and Sidecar Sync
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-user}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-password}
    AWS_DEFAULT_REGION: us-east-1
    # For quick experiments
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
  volumes:
    - airflow-dags:/opt/airflow/dags
    - airflow-plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"

services:
  # ==========================================
  # [PROFILE: airflow] Orchestration
  # ==========================================
  airflow-sync:
    image: amazon/aws-cli:2.34.45
    container_name: airflow-sync
    profiles:
      - airflow
    networks:
      - odctl
    mem_limit: 256m
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-user}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-password}
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - airflow-dags:/opt/airflow/dags
      - airflow-plugins:/opt/airflow/plugins
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo 'Starting DAG sync from dedicated SeaweedFS Airflow bucket...'
        while true; do
          aws --endpoint-url http://seaweed:8333 s3 sync s3://airflow/dags /opt/airflow/dags --exact-timestamps
          aws --endpoint-url http://seaweed:8333 s3 sync s3://airflow/plugins /opt/airflow/plugins --exact-timestamps
          sleep 30
        done

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e

        echo "Initializing Airflow Core Database..."
        airflow db migrate

        echo "Initializing FAB (Auth) Database..."
        airflow fab-db migrate

        echo "Creating admin user..."
        # We use || true so it doesn't crash on future restarts if the user already exists
        airflow users create \
          --username user \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email user@example.com \
          --password password || true

        echo "Airflow initialization complete."

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: api-server
    ports:
      - "8085:8080"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    container_name: airflow-triggerer
    command: triggerer
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

networks:
  odctl:
    name: odctl
    external: true
