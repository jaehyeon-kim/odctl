name: odctl-store


services:

  # ==========================================
  # [PROFILE: fluss] Streaming Storage Engine
  # ==========================================
  fluss-coordinator:
    image: apache/fluss:0.9.0-incubating
    container_name: fluss-coordinator
    command: coordinatorServer
    profiles: ["fluss"]
    ports:
      - "9123:9123"
    networks:
      - odctl

    mem_limit: 1g
    environment:
      - JVM_ARGS=-Xmx512m
      - |
        FLUSS_PROPERTIES=
        zookeeper.address: clickhouse-keeper:9181
        bind.listeners: INTERNAL://fluss-coordinator:0, CLIENT://fluss-coordinator:9123
        advertised.listeners: CLIENT://fluss-coordinator:9123
        internal.listener.name: INTERNAL
        remote.data.dir: /tmp/fluss/remote-data

  fluss-tablet-1:
    image: apache/fluss:0.9.0-incubating
    container_name: fluss-tablet-1
    command: tabletServer
    profiles: ["fluss"]
    ports:
      - "9124:9123"
    networks:
      - odctl
    depends_on:
      - fluss-coordinator
    mem_limit: 2g
    environment:
      - JVM_ARGS=-Xmx1500m
      - |
        FLUSS_PROPERTIES=
        zookeeper.address: clickhouse-keeper:9181
        bind.listeners: INTERNAL://fluss-tablet-1:0, CLIENT://fluss-tablet-1:9123
        advertised.listeners: CLIENT://fluss-tablet-1:9123
        internal.listener.name: INTERNAL
        tablet-server.id: 0
        kv.snapshot.interval: 0s
        data.dir: /tmp/fluss/data
        remote.data.dir: /tmp/fluss/remote-data

  # ==========================================
  # Valkey (Redis Alternative) + Valkey Search
  # ==========================================
  valkey:
    image: valkey/valkey-bundle:9.1.1-alpine
    container_name: valkey
    ports:
      - "6379:6379"
    networks:
      - odctl
    profiles:
      - valkey
    command:
      - valkey-server
      # Disable the unauthenticated default user.
      - --user
      - default
      - "off"
      # Create the application user.
      - --user
      - user
      - "on"
      - ">password"
      - "~*"
      - "+@all"
      # Persistence.
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1"
      # Logging.
      - --loglevel
      - warning
    healthcheck:
      test:
        - CMD-SHELL
        - VALKEYCLI_AUTH=password valkey-cli --user user ping | grep -q PONG
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 512m


networks:
  odctl:
    name: odctl
    external: true
