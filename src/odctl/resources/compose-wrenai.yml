name: odctl-wrenai

volumes:
  wren_data:

services:
  wren-bootstrap:
    image: ghcr.io/canner/wren-bootstrap:0.1.5
    container_name: wren-bootstrap
    profiles:
      - wrenai
    restart: on-failure
    environment:
      DATA_PATH: /app/data
    volumes:
      - wren_data:/app/data
    networks:
      - odctl
    command: /bin/sh /app/init.sh

  wren-engine:
    image: ghcr.io/canner/wren-engine:0.13.1
    container_name: wren-engine
    profiles:
      - wrenai
    restart: on-failure
    ports:
      - "8088:8080"
      - "7432:7432"
    volumes:
      - wren_data:/usr/src/app/etc
      - wren_data:/usr/src/app/data
    networks:
      - odctl
    depends_on:
      - wren-bootstrap

  wren-engine-ibis:
    image: ghcr.io/canner/wren-engine-ibis:0.13.1
    container_name: wren-engine-ibis
    profiles:
      - wrenai
    restart: on-failure
    environment:
      WREN_ENGINE_ENDPOINT: http://wren-engine:8080
    networks:
      - odctl

  wren-ai-service:
    image: ghcr.io/canner/wren-ai-service:0.15.7
    container_name: wren-ai-service
    profiles:
      - wrenai
    restart: on-failure
    ports:
      - "5555:5555"
    environment:
      PYTHONUNBUFFERED: 1
      CONFIG_PATH: /app/data/config.yaml
    volumes:
      - wren_data:/app/data
    networks:
      - odctl
    depends_on:
      - wren-qdrant

  wren-qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: wren-qdrant
    profiles:
      - wrenai
    restart: on-failure
    ports:
      - "6333:6333"
    volumes:
      - wren_data:/qdrant/storage
    networks:
      - odctl

  wren-ui:
    image: ghcr.io/canner/wren-ui:0.20.1
    container_name: wren-ui
    profiles:
      - wrenai
    restart: on-failure
    environment:
      DB_TYPE: sqlite
      SQLITE_FILE: /app/data/db.sqlite3
      WREN_ENGINE_ENDPOINT: http://wren-engine:8080
      WREN_AI_ENDPOINT: http://wren-ai-service:5555
      IBIS_SERVER_ENDPOINT: http://wren-engine-ibis:8000
    ports:
      - "3001:3000"
    volumes:
      - wren_data:/app/data
    networks:
      - odctl
    depends_on:
      - wren-ai-service
      - wren-engine

networks:
  odctl:
    name: odctl
    external: true
